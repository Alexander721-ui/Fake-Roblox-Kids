<!DOCTYPE html>
<html>
<head>
<title>Roblox Kids Simulator v5</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#3aa0ff;
    color:white;
}

.topbar{
    display:flex;
    gap:10px;
    padding:10px;
    background:rgba(0,0,0,0.2);
    align-items:center;
}

input{
    flex:1;
    padding:6px;
    border-radius:8px;
    border:none;
}

.container{display:flex;}

.sidebar{
    width:220px;
    height:100vh;
    background:rgba(0,0,0,0.2);
    padding:10px;
}

.tab{
    padding:10px;
    margin:8px 0;
    background:rgba(255,255,255,0.15);
    border-radius:10px;
    cursor:pointer;
}

.main{flex:1;padding:15px;}

.page{display:none;}

.card{
    display:inline-block;
    width:180px;
    padding:10px;
    margin:8px;
    background:rgba(255,255,255,0.15);
    border-radius:12px;
}

button{
    width:100%;
    margin-top:6px;
    padding:6px;
    border:none;
    border-radius:8px;
    background:#ffffff55;
    cursor:pointer;
}
